<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>品茗手帖 · 上海茶館</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    #map { background: #E8DCC8; }
  </style>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="outer-frame">
    <span class="corner-bl"></span>
    <span class="corner-br"></span>

    <header>
      <div class="header-deco">茶</div>
      <div class="header-center">
        <div class="header-title">品 茗 手 帖</div>
        <div class="header-sub">中 國 茶 産 地 圖</div>
      </div>
      <div style="display:flex;gap:8px;align-items:stretch">
        <a href="/list" class="btn-list">記 錄 一 覧</a>
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
          <a href="/record" class="btn-record" style="display:flex;align-items:center;justify-content:center">＋ 新 記 錄</a>
          <span style="font-size:9px;color:var(--text2);letter-spacing:0.05em;opacity:0.7">© Poivrerose</span>
        </div>
      </div>
    </header>

    <div id="map"></div>

    <div id="popup-overlay" class="hidden">
      <div id="popup">
        <button id="popup-close">✕ 閉</button>
        <h2 id="popup-region"></h2>
        <ul id="popup-list"></ul>
      </div>
    </div>

    <div id="sync-bar" class="hidden">
      <span>未 送 信 記 錄：<span id="sync-count"></span> 件</span>
      <button id="sync-btn">今 す ぐ 同 期</button>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/js/db.js"></script>
  <script src="/static/js/sync.js"></script>
  <script src="/static/js/map.js"></script>
</body>
</html>
